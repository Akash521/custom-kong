version: "3.9"

x-kong-config: &kong-env
  KONG_DATABASE: postgres
  KONG_PG_DATABASE: kong
  KONG_PG_HOST: db
  KONG_PG_USER: kong
  KONG_PG_PASSWORD_FILE: /run/secrets/kong_postgres_password
  
  # ✅ PLUGIN CONFIGURATION
  KONG_PLUGINS: bundled,oidc
  
  # ✅ LUA PATH for custom plugins
  KONG_LUA_PACKAGE_PATH: "/usr/local/kong/plugins/?.lua;/usr/local/kong/plugins/?/init.lua;;"
  
  # ✅ LUA C PATH for native modules
  KONG_LUA_CPATH: "/usr/local/kong/lib/?.so;;"

volumes:
  kong_data:
  kong_prefix_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
  kong_tmp_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  kong-net:
    driver: bridge

secrets:
  kong_postgres_password:
    file: ./POSTGRES_PASSWORD

services:
  db:
    image: postgres:18.2
    container_name: kong-postgres
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD_FILE: /run/secrets/kong_postgres_password
    secrets:
      - kong_postgres_password
    volumes:
      - kong_data:/var/lib/postgresql
    networks:
      - kong-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong-custom:latest-oidc
    command: kong migrations bootstrap
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *kong-env
    secrets:
      - kong_postgres_password
    networks:
      - kong-net
    restart: on-failure

  kong-migrations-up:
    image: kong-custom:latest-oidc
    command: kong migrations up && kong migrations finish
    depends_on:
      db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      <<: *kong-env
    secrets:
      - kong_postgres_password
    networks:
      - kong-net
    restart: on-failure

  kong:
    image: kong-custom:latest-oidc  # ✅ Use pre-built custom image
    container_name: kong-gateway
    extra_hosts:
      - "keycloak:172.30.0.4"   # ← hardcode keycloak hostname
    user: kong
    depends_on:
      db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
      kong-migrations-up:
        condition: service_completed_successfully
    environment:
      <<: *kong-env
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PREFIX: /var/run/kong
      KONG_LOG_LEVEL: info
    secrets:
      - kong_postgres_password
    networks:
      - kong-net
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
      - "8002:8002"
    restart: always
    volumes:
      - kong_prefix_vol:/var/run/kong
      - kong_tmp_vol:/tmp
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10